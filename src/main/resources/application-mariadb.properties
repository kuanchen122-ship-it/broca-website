spring.datasource.url=${BROCA_DB_URL:jdbc:mariadb://localhost:3306/broca_website?useUnicode=true&characterEncoding=utf8}
spring.datasource.username=${BROCA_DB_USERNAME:broca_app}
spring.datasource.password=${BROCA_DB_PASSWORD:}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.sql.init.mode=always
spring.h2.console.enabled=false

line.messaging.channel-access-token=${LINE_CHANNEL_ACCESS_TOKEN:}
line.messaging.channel-secret=${LINE_CHANNEL_SECRET:}
line.messaging.sending-enabled=${LINE_SENDING_ENABLED:false}
line.liff.rollcall-id=${LINE_LIFF_ROLLCALL_ID:}

# Synology reverse proxy terminates HTTPS before forwarding to Spring Boot.
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=${BROCA_SECURE_COOKIES:true}
server.servlet.session.cookie.same-site=lax
