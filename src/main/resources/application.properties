spring.application.name=broca-website

# Local development database. Use the mariadb profile on Synology/NAS.
spring.datasource.url=jdbc:h2:file:./data/broca;MODE=MariaDB;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=${BROCA_LOCAL_DB_PASSWORD:}
spring.sql.init.mode=always
spring.h2.console.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# LINE integration remains disabled until the official channel is configured.
line.messaging.channel-access-token=${LINE_CHANNEL_ACCESS_TOKEN:}
line.messaging.channel-secret=${LINE_CHANNEL_SECRET:}
line.messaging.sending-enabled=${LINE_SENDING_ENABLED:false}
line.liff.rollcall-id=${LINE_LIFF_ROLLCALL_ID:}

# Optional first-account bootstrap. Passwords stay outside source control.
broca.bootstrap.admin-username=${BROCA_BOOTSTRAP_ADMIN_USERNAME:director}
broca.bootstrap.admin-password=${BROCA_BOOTSTRAP_ADMIN_PASSWORD:}
broca.bootstrap.teacher-username=${BROCA_BOOTSTRAP_TEACHER_USERNAME:teacher}
broca.bootstrap.teacher-password=${BROCA_BOOTSTRAP_TEACHER_PASSWORD:}

server.port=${BROCA_SERVER_PORT:8080}
server.forward-headers-strategy=framework
